<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognitive Cache</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="sidepanel.css">
</head>

<body>
    <!-- Welcome Screen -->
    <div id="welcome-screen" class="screen welcome-screen">
        <div class="welcome-bg"></div>
        <div class="welcome-content">
            <div class="welcome-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#64ffda" stroke-width="1.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2a4 4 0 0 1 4 4v8a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z" />
                    <path d="M8 14v1a4 4 0 0 0 8 0v-1" />
                    <circle cx="12" cy="6" r="1" fill="#64ffda" />
                    <path d="M16 10c2 0 4 1 4 3s-2 3-4 3" />
                    <path d="M8 10c-2 0-4 1-4 3s2 3 4 3" />
                </svg>
            </div>
            <h1>Cognitive Cache</h1>
            <p class="welcome-subtitle">Your private second brain</p>
            <p class="welcome-desc">Start the backend to begin saving and querying your web knowledge — all locally, all
                private.</p>
            <button id="start-backend-btn" class="btn-primary">Start Backend</button>
        </div>
    </div>

    <!-- Main Screen -->
    <div id="main-screen" class="screen main-screen hidden">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <div class="header-logo">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64ffda" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a4 4 0 0 1 4 4v8a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z" />
                        <path d="M8 14v1a4 4 0 0 0 8 0v-1" />
                        <circle cx="12" cy="6" r="1" fill="#64ffda" />
                    </svg>
                </div>
                <span class="header-title">Cognitive Cache</span>
            </div>
            <div class="header-right">
                <span id="source-count-badge" class="source-badge" title="Saved sources">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
                    </svg>
                    <span id="source-count">0</span>
                </span>
            </div>
        </header>

        <!-- Ingest Section -->
        <section class="ingest-section">
            <div class="ingest-row">
                <button id="save-context-btn" class="btn-save" disabled>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
                        <polyline points="17 21 17 13 7 13 7 21" />
                        <polyline points="7 3 7 8 15 8" />
                    </svg>
                    <span id="save-btn-text">Save Current Page</span>
                </button>
                <div id="ingest-status" class="status-toast hidden"></div>
            </div>
        </section>

        <!-- Chat Section -->
        <section class="chat-section">
            <div id="chat-container">
                <div id="chat-messages">
                    <div class="empty-state" id="empty-state">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#5f6368" stroke-width="1.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10" />
                            <path d="M12 6v6l4 2" />
                        </svg>
                        <p>Your knowledge base is ready.<br>Save content or ask a question.</p>
                    </div>
                </div>

                <!-- Backend Error Banner -->
                <div id="backend-error" class="backend-error hidden">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ef5350" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="8" x2="12" y2="12" />
                        <line x1="12" y1="16" x2="12.01" y2="16" />
                    </svg>
                    <span>Backend offline — start the server on <code>localhost:8000</code></span>
                    <button id="dismiss-error-btn" class="btn-dismiss">&times;</button>
                </div>

                <!-- Input Area -->
                <div class="input-area">
                    <form id="chat-form">
                        <div class="input-wrapper">
                            <textarea id="chat-input" placeholder="Ask about your knowledge base..." rows="1"
                                maxlength="500"></textarea>
                            <button type="submit" id="send-btn" class="btn-send" title="Send message">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="22" y1="2" x2="11" y2="13" />
                                    <polygon points="22 2 15 22 11 13 2 9 22 2" />
                                </svg>
                            </button>
                        </div>
                    </form>
                    <div class="input-footer">
                        <button id="clear-history-btn" class="btn-ghost">Clear history</button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script src="marked.min.js"></script>
    <script src="sidepanel.js"></script>
</body>

</html>
